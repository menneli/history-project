<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HistorySounds{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>
    <div id="shpinner-overlay">
      <div class="shpinner"></div>
      <p>Загрузка...</p>
    </div>

    <header>
        <a href="/" class="logo">HistorySounds</a>
        <nav><a href="/">Таймлайн</a></nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>© 2026 HistorySounds • Данные загружаются из Excel • Работает на FastAPI</p>
    </footer>

    <script>
      // Hide shpinner when page fully loads
      window.addEventListener('load', () => {
        const overlay = document.getElementById('shpinner-overlay');
        if (overlay) overlay.classList.add('hidden');
      });
    </script>
</body>
</html>
